<div class="group-container">
  <header class="page-header">
    <h1 class="title">Gestión de Grupos</h1>
  </header>

  <div class="summary-banner">
    <div class="banner-content">
      <span class="banner-label">TOTAL N</span>
      <span class="banner-number">{{ totalN }}</span>
    </div>
    <div class="banner-icon">
      <i class="pi pi-users"></i>
    </div>
  </div>

  <div class="advances-container">
    <div class="flex justify-content-between align-items-center mb-4">
      <h2 class="section-title">Avances</h2>
      <p-button label="Nuevo Grupo" icon="pi pi-plus" 
                styleClass="p-button-success p-button-rounded" 
                (onClick)="abrirNuevo()"></p-button>
    </div>

    <p-card class="table-card shadow-2">
      <p-table [value]="grupos" [rows]="5" [paginator]="true" responsiveLayout="scroll">
        <ng-template pTemplate="header">
          <tr>
            <th>Nombre</th>
            <th>Nivel</th>
            <th>Autor</th>
            <th>Integrantes</th>
            <th>Tickets</th>
            <th>Estado</th>
            <th style="width: 120px" class="text-center">Acciones</th>
          </tr>
        </ng-template>
        
        <ng-template pTemplate="body" let-grupo>
          <tr>
            <td class="font-bold">{{ grupo.nombre }}</td>
            <td>{{ grupo.nivel }}</td>
            <td>{{ grupo.autor }}</td>
            <td>{{ grupo.integrantes }}</td>
            <td><p-tag [value]="grupo.tickets" severity="warn"></p-tag></td>
            <td><p-tag [severity]="getSeverity(grupo.estado)" [value]="grupo.estado"></p-tag></td>
            <td>
              <div class="flex justify-content-center gap-2">
                <button pButton 
                        type="button" 
                        icon="pi pi-pencil" 
                        class="p-button-rounded p-button-info p-button-text" 
                        (click)="editarGrupo(grupo)">
                       <i class="pi pi-pencil"></i> 
                </button>
                
                <button pButton 
                        type="button" 
                        icon="pi pi-trash" 
                        class="p-button-rounded p-button-danger p-button-text" 
                        (click)="eliminarGrupo(grupo.id)">
                       <i class="pi pi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table> </p-card>
  </div>
</div>

<p-dialog [(visible)]="mostrarDialogo" 
          [header]="grupoSeleccionado.id ? 'Editar Información del Grupo' : 'Registrar Nuevo Grupo'" 
          [modal]="true" 
          [style]="{width: '450px'}" 
          styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field mb-3">
            <label class="font-bold block mb-1">Nombre del Grupo</label>
            <input type="text" pInputText [(ngModel)]="grupoSeleccionado.nombre" placeholder="Ej. Desarrolladores Alpha" />
        </div>
        <div class="field mb-3">
            <label class="font-bold block mb-1">Nivel</label>
            <input type="text" pInputText [(ngModel)]="grupoSeleccionado.nivel" placeholder="Ej. Avanzado" />
        </div>
        <div class="field mb-3">
            <label class="font-bold block mb-1">Autor</label>
            <input type="text" pInputText [(ngModel)]="grupoSeleccionado.autor" />
        </div>
        <div class="field mb-3">
            <label class="font-bold block mb-1">Descripción</label>
            <textarea pTextarea [(ngModel)]="grupoSeleccionado.descripcion" rows="3"></textarea>
        </div>
        <div class="field mb-3">
            <label class="font-bold block mb-1">Estado</label>
            <select [(ngModel)]="grupoSeleccionado.estado" class="p-inputtext">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
               
            </select>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" 
                  styleClass="p-button-text p-button-secondary" 
                  (onClick)="mostrarDialogo = false"></p-button>
        <p-button label="Guardar Cambios" icon="pi pi-check" 
                  (onClick)="guardarGrupo()"></p-button>
    </ng-template>
</p-dialog>
